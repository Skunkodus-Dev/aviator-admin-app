<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Admin Application</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(220, 20, 20, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(200, 0, 0, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(180, 10, 10, 0.08) 0%, transparent 50%);
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 500px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .plane-icon {
            font-size: 45px;
            animation: fly 2s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(255, 50, 50, 0.6));
        }

        @keyframes fly {
            0%, 100% { transform: translateY(0) rotate(-10deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        .title {
            font-size: 36px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 2px;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
        }

        .title span {
            color: #e63946;
        }

        .subtitle {
            color: #aaa;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .card {
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 35px 30px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(230, 57, 70, 0.3);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #ccc;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        textarea {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus,
        textarea:focus {
            border-color: #e63946;
            box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        input::placeholder,
        textarea::placeholder {
            color: #666;
        }

        .file-upload-wrapper {
            position: relative;
        }

        .file-upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.02);
        }

        .file-upload-area:hover {
            border-color: #e63946;
            background: rgba(230, 57, 70, 0.05);
        }

        .file-upload-area.dragover {
            border-color: #e63946;
            background: rgba(230, 57, 70, 0.1);
        }

        .file-icon {
            font-size: 35px;
            margin-bottom: 8px;
        }

        .file-text {
            color: #999;
            font-size: 13px;
        }

        .file-name {
            color: #4ade80;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        .file-name.show {
            display: block;
        }

        input[type="file"] {
            display: none;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #e63946, #c1121f);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(230, 57, 70, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .submit-btn.loading .spinner {
            display: inline-block;
        }

        .submit-btn.loading .btn-text {
            display: none;
        }

        .message {
            display: none;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-top: 20px;
            font-weight: 600;
        }

        .message.success {
            display: block;
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.4);
            color: #4ade80;
        }

        .message.error {
            display: block;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #f87171;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: #555;
            font-size: 12px;
        }

        .sites-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 8px;
        }

        .site-tag {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            color: #888;
        }

        @media (max-width: 480px) {
            .card {
                padding: 25px 20px;
            }
            .title {
                font-size: 28px;
            }
            .plane-icon {
                font-size: 35px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="logo-area">
                <div class="plane-icon">✈️</div>
                <h1 class="title">AVIA<span>TOR</span></h1>
            </div>
            <p class="subtitle">ADMIN APPLICATION</p>
        </div>

        <div class="card">
            <form id="applicationForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label>Contact Number</label>
                    <input type="tel" id="phone" placeholder="e.g. 082 123 4567" required>
                </div>

                <div class="form-group">
                    <label>Why do you want to be an Admin?</label>
                    <textarea id="motivation" placeholder="Tell us why you'd be a great Aviator Admin..." required></textarea>
                </div>

                <div class="form-group">
                    <label>Upload ID Photo (Proof of 18+)</label>
                    <div class="file-upload-wrapper">
                        <div class="file-upload-area" id="dropArea">
                            <div class="file-icon">📷</div>
                            <div class="file-text">Click to upload or drag & drop</div>
                            <div class="file-text" style="font-size:11px;color:#555;">JPG, PNG or PDF accepted</div>
                            <div class="file-name" id="fileName"></div>
                        </div>
                        <input type="file" id="idPhoto" accept="image/jpeg,image/png,application/pdf" required>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span class="spinner"></span>
                    <span class="btn-text">Submit Application</span>
                </button>
            </form>

            <div class="message" id="messageBox"></div>
        </div>

        <div class="footer">
            <p>Your application will be sent to:</p>
            <div class="sites-list">
                <span class="site-tag">Sunbet</span>
                <span class="site-tag">Hollywoodbets</span>
                <span class="site-tag">Interbet</span>
                <span class="site-tag">Lulabet</span>
                <span class="site-tag">Easybet</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            emailjs.init("u_uSqVWSrAgfFkotX");
        })();

        const bettingSites = [
            "aviatoradminsupport@gmail.com",
        ];

        const dropArea = document.getElementById('dropArea');
        const fileInput = document.getElementById('idPhoto');
        const fileName = document.getElementById('fileName');

        dropArea.addEventListener('click', () => fileInput.click());

        dropArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropArea.classList.add('dragover');
        });

        dropArea.addEventListener('dragleave', () => {
            dropArea.classList.remove('dragover');
        });

        dropArea.addEventListener('drop', (e) => {
            e.preventDefault();
            dropArea.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                showFileName(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) {
                showFileName(fileInput.files[0]);
            }
        });

        function showFileName(file) {
            fileName.textContent = '📎 ' + file.name;
            fileName.classList.add('show');
        }

        const form = document.getElementById('applicationForm');
        const submitBtn = document.getElementById('submitBtn');
        const messageBox = document.getElementById('messageBox');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            messageBox.className = 'message';
            messageBox.style.display = 'none';

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const motivation = document.getElementById('motivation').value.trim();
            const idFile = fileInput.files[0];

            if (!name || !email || !phone || !motivation || !idFile) {
                showMessage('Please fill in all fields and upload your ID.', 'error');
                return;
            }

            const idBase64 = await fileToBase64(idFile);

            submitBtn.classList.add('loading');
            submitBtn.disabled = true;

            let allSuccess = true;

            for (const siteEmail of bettingSites) {
                try {
                    const response = await emailjs.send("service_lr1t6it", "template_xgxq2gq", {
                        to_email: siteEmail,
                        name: name,
                        email: email,
                        phone: phone,
                        motivation: motivation,
                        id_photo: idBase64,
                        id_filename: idFile.name
                    });
                } catch (error) {
                    allSuccess = false;
                }
            }

            submitBtn.classList.remove('loading');
            submitBtn.disabled = false;

            if (allSuccess) {
                showMessage('✅ Application submitted successfully! Sent to all 5 betting sites.', 'success');
                form.reset();
                fileName.classList.remove('show');
            } else {
                showMessage('⚠️ Some emails failed to send. Please try again.', 'error');
            }
        });

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const base64 = reader.result.split(',')[1];
                    resolve(base64);
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function showMessage(text, type) {
            messageBox.textContent = text;
            messageBox.className = 'message ' + type;
            messageBox.style.display = 'block';
            messageBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    </script>

</body>
</html>
